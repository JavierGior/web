<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esto si funciona</title>
    <style>
        @keyframes fadeInOut {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animated-text {
            font-size: 2rem;
            animation: fadeInOut 2s infinite;
        }
    </style>
</head>
<body>
    <div class="animated-text">Esto si funciona</div>
</body>
</html>
